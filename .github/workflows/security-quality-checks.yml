name: Security and Quality Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  lint-and-format:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check code formatting
        run: npm run format:check
      
      - name: Lint code
        run: npx eslint . --ext .ts,.js || true

  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Type check
        run: npx tsc --noEmit

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run gateway tests
        run: npm run test:gateway || true
        continue-on-error: true
      
      - name: Run plugin tests
        run: npm run test:plugins || true
        continue-on-error: true

  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run npm audit
        run: npm audit --audit-level=moderate || true
        continue-on-error: true
      
      - name: Check for known vulnerabilities
        run: |
          echo "Checking for known security vulnerabilities..."
          npm audit --json > audit-results.json || true
      
      - name: Upload audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-audit-results
          path: audit-results.json

  phi-detection:
    name: PHI/PII Pattern Detection
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      
      - name: Scan for PHI/PII patterns
        run: |
          echo "Scanning all tracked files for PHI/PII patterns..."
          # Create a simplified version that scans all files
          node -e "
          const { readFileSync, readdirSync, statSync } = require('fs');
          const { join } = require('path');
          
          const PHI_PATTERNS = [
            { pattern: /\b\d{3}-\d{2}-\d{4}\b/g, name: 'SSN' },
            { pattern: /AKIA[0-9A-Z]{16}/g, name: 'AWS_KEY' },
            { pattern: /-----BEGIN (?:RSA |EC |DSA )?PRIVATE KEY-----/g, name: 'PRIVATE_KEY' },
          ];
          
          const IGNORE = ['node_modules', '.git', 'dist', 'build', 'coverage'];
          const ALLOWED = ['example', 'test', 'mock', 'xxx-xx-', '123-45-6789'];
          
          function scanDir(dir, issues = []) {
            const files = readdirSync(dir);
            for (const file of files) {
              const path = join(dir, file);
              if (IGNORE.some(i => path.includes(i))) continue;
              
              const stat = statSync(path);
              if (stat.isDirectory()) {
                scanDir(path, issues);
              } else if (path.match(/\.(ts|js|json|md)$/)) {
                try {
                  const content = readFileSync(path, 'utf8');
                  const lines = content.split('\\n');
                  
                  lines.forEach((line, idx) => {
                    PHI_PATTERNS.forEach(({ pattern, name }) => {
                      const matches = [...line.matchAll(pattern)];
                      matches.forEach(match => {
                        if (!ALLOWED.some(a => line.toLowerCase().includes(a))) {
                          issues.push({ file: path, line: idx + 1, type: name, match: match[0] });
                        }
                      });
                    });
                  });
                } catch (e) {}
              }
            }
            return issues;
          }
          
          const issues = scanDir('.');
          if (issues.length > 0) {
            console.log('⚠️ Potential PHI/PII patterns detected:');
            issues.forEach(i => console.log(\`  \${i.file}:\${i.line} - \${i.type}\`));
            process.exit(1);
          } else {
            console.log('✅ No PHI/PII patterns detected');
          }
          "

  build:
    name: Build Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build project
        run: npm run build
      
      - name: Build plugins
        run: npm run build-plugins

  summary:
    name: Quality Gate Summary
    runs-on: ubuntu-latest
    needs: [lint-and-format, type-check, test, security-scan, phi-detection, build]
    if: always()
    
    steps:
      - name: Check results
        run: |
          echo "Quality Gate Summary:"
          echo "  Lint & Format: ${{ needs.lint-and-format.result }}"
          echo "  Type Check: ${{ needs.type-check.result }}"
          echo "  Tests: ${{ needs.test.result }}"
          echo "  Security Scan: ${{ needs.security-scan.result }}"
          echo "  PHI Detection: ${{ needs.phi-detection.result }}"
          echo "  Build: ${{ needs.build.result }}"
          
          if [ "${{ needs.lint-and-format.result }}" != "success" ] || \
             [ "${{ needs.type-check.result }}" != "success" ] || \
             [ "${{ needs.phi-detection.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ Quality gate failed!"
            exit 1
          else
            echo "✅ Quality gate passed!"
          fi
